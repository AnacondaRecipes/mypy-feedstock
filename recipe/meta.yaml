{% set name = "mypy" %}
{% set version = "1.20.2" %}

package:
  name: {{ name }}-split
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: e8222c26daaafd9e8626dec58ae36029f82585890589576f769a650dd20fd665

build:
  number: 0
  skip: true  # [py<310]

outputs:
  - name: {{ name }}
    script: build_mypy.sh  # [unix]
    script: bld_mypy.bat  # [win]
    build:
      skip: true  # [py<310]
      entry_points:
        - mypy = mypy.__main__:console_entry
        - stubgen = mypy.stubgen:main
        - stubtest = mypy.stubtest:main
        - dmypy = mypy.dmypy.client:console_entry
        - mypyc = mypyc.__main__:main
    requirements:
      build:
        - {{ stdlib('c') }}
        - {{ compiler('c') }}
      host:
        - python
        - pip
        - setuptools >=77.0.3
        - typing-extensions >=4.6.0   # [py<315]
        - typing-extensions >=4.14.0  # [py>=315]
        - mypy_extensions >=1.0.0
        - pathspec >=1.0.0
        - tomli >=1.1.0               # [py<311]
        - python-librt >=0.8.0
        - types-psutil
        - types-setuptools
      run:
        - python
        - typing-extensions >=4.6.0   # [py<315]
        - typing-extensions >=4.14.0  # [py>=315]
        - mypy_extensions >=1.0.0
        - pathspec >=1.0.0
        - tomli >=1.1.0               # [py<311]
        - python-librt >=0.8.0
        # extra: dmypy
        - psutil >=4.0
    test:
      imports:
        - mypy
        - mypy.dmypy
        - mypy.plugins
        - mypy.server
        - mypyc
      commands:
        - pip check
        - mypy --help
        - stubgen --help
        - stubtest --help
        - dmypy --help
        - mypyc --help
        - dir %SP_DIR%\mypy\*.pyd /s /b  # [win and not py==313]
        - ls $SP_DIR/mypy/*.so  # [(not win) and not py==313]
      requires:
        - pip
        - setuptools  # [py>=314]

  - name: mypyc
    requirements:
      host:
        - python
      run:
        - {{ pin_subpackage("mypy", exact=True) }}
        # https://github.com/python/mypy/blob/v1.19.1/mypyc/build.py#L125
        - {{ stdlib('c') }}
        - {{ compiler('c') }}
        - python
        # https://github.com/python/mypy/blob/v1.19.1/mypyc/build.py#L108
        - setuptools >=50
    test:
      files:
        - test_mypyc.py
      requires:
        - pip
      commands:
        - pip check
        - mypyc --help
        - python test_mypyc.py

about:
  home: https://www.mypy-lang.org
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Optional static typing for Python
  description: |
    Add type annotations to your Python programs, and use mypy to type check
    them. Mypy is essentially a Python linter on steroids, and it can catch
    many programming errors by analyzing your program, withoutactually having
    to run it.  Mypy has a powerful type system with features such as type
    inference, gradual typing, generics and union types.
  doc_url: https://mypy.readthedocs.io
  dev_url: https://github.com/python/mypy

extra:
  recipe-maintainers:
    - nehaljwani
    - ocefpaf
    - matthiasdiener
    - bollwyvl
    - cbouss
  skip-lints:
    - missing_imports_or_run_test_py
    - python_build_tool_in_run
    - missing_python_build_tool
    - stdlib_must_be_in_build
    - compilers_must_be_in_build
